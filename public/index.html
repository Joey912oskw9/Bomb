<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2RAY PRO PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .table-row:hover { background-color: rgba(51, 65, 85, 0.3); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- سایدبار -->
    <aside class="w-64 bg-slate-900 border-l border-slate-800 flex flex-col">
        <div class="p-6 text-center border-b border-slate-800">
            <h1 class="text-2xl font-extrabold text-blue-400 tracking-wider">V2RAY PRO</h1>
            <p class="text-xs text-slate-500 mt-1">Management Panel</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showPage('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-slate-800 text-blue-400 font-medium transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                داشبورد
            </button>
            <button onclick="showPage('users')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-blue-400 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                کاربران
            </button>
        </nav>
        <div class="p-4 border-t border-slate-800 text-xs text-slate-600 text-center">
            Powered by Node.js | v1.0
        </div>
    </aside>

    <!-- محتوای اصلی -->
    <main class="flex-1 overflow-y-auto p-8">
        
        <!-- هدر بالای صفحه -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 id="page-title" class="text-3xl font-bold text-white">داشبورد</h2>
                <p class="text-slate-500 mt-1 text-sm">نمای کلی سیستم و وضعیت کاربران</p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="openCreateModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-colors font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    کاربر جدید
                </button>
            </div>
        </header>

        <!-- صفحه داشبورد -->
        <div id="page-dashboard" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass p-6 rounded-xl">
                <p class="text-slate-400 text-sm mb-2">کل کاربران</p>
                <h3 id="stat-total" class="text-4xl font-bold text-white">0</h3>
            </div>
            <div class="glass p-6 rounded-xl">
                <p class="text-slate-400 text-sm mb-2">کاربران فعال</p>
                <h3 id="stat-active" class="text-4xl font-bold text-emerald-500">0</h3>
            </div>
            <div class="glass p-6 rounded-xl">
                <p class="text-slate-400 text-sm mb-2">ترافیک مصرف شده (GB)</p>
                <h3 id="stat-used" class="text-4xl font-bold text-amber-500">0</h3>
            </div>
            <div class="glass p-6 rounded-xl">
                <p class="text-slate-400 text-sm mb-2">مجموع محدودیت (GB)</p>
                <h3 id="stat-limit" class="text-4xl font-bold text-blue-500">0</h3>
            </div>
        </div>

        <!-- جدول کاربران -->
        <div class="glass rounded-xl overflow-hidden">
            <table class="w-full text-right">
                <thead class="bg-slate-800/50 text-slate-400 text-sm">
                    <tr>
                        <th class="p-4 font-medium">نام کاربر</th>
                        <th class="p-4 font-medium">UUID</th>
                        <th class="p-4 font-medium">وضعیت</th>
                        <th class="p-4 font-medium">ترافیک</th>
                        <th class="p-4 font-medium">انقضا</th>
                        <th class="p-4 font-medium">عملیات</th>
                    </tr>
                </thead>
                <tbody id="users-table" class="divide-y divide-slate-800">
                    <!-- ردیف‌ها با جاوااسکریپت پر میشن -->
                </tbody>
            </table>
        </div>

    </main>

    <!-- مودال ساخت کاربر -->
    <div id="create-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="glass rounded-2xl p-8 w-full max-w-md border border-slate-700 shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-6">ساخت کانفیگ جدید</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">نام / آیدی</label>
                    <input id="c-name" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 text-white" placeholder="مثلا: ali_vip">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">آدرس سرور (Host/Domain)</label>
                    <input id="c-host" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 text-white" placeholder="example.com">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Path (مسیر)</label>
                    <input id="c-path" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 text-white" placeholder="/vless">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">حجم (GB)</label>
                        <input id="c-limit" type="number" value="0" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">مدت (روز)</label>
                        <input id="c-expire" type="number" value="30" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 text-white">
                    </div>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="createUser()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-medium transition">ساخت کانفیگ</button>
                <button onclick="closeCreateModal()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg font-medium transition">انصراف</button>
            </div>
        </div>
    </div>

    <!-- مودال نمایش لینک و QR -->
    <div id="qr-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="glass rounded-2xl p-8 w-full max-w-md border border-slate-700 shadow-2xl text-center">
            <h3 class="text-xl font-bold text-white mb-4">کانفیگ ساخته شد</h3>
            <img id="qr-image" src="" alt="QR Code" class="w-48 h-48 mx-auto rounded-lg mb-4 bg-white p-2">
            <div class="bg-slate-900 p-3 rounded-lg flex items-center gap-2 mb-4">
                <p id="vless-text" class="text-xs text-emerald-400 break-all flex-1 text-left" dir="ltr"></p>
                <button onclick="copyLink()" class="bg-emerald-600 text-white px-3 py-1 rounded text-xs">کپی</button>
            </div>
            <button onclick="closeQrModal()" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg font-medium transition">بستن</button>
        </div>
    </div>

    <script>
        // --- توابع مدیریت UI ---
        function showPage(page) {
            document.getElementById('page-title').innerText = page === 'dashboard' ? 'داشبورد' : 'مدیریت کاربران';
            // فعلا هر دو صفحه یک جدول رو نشون میدن، در آینده میشه تفکیک کرد
        }

        function openCreateModal() {
            document.getElementById('create-modal').style.display = 'flex';
        }
        function closeCreateModal() {
            document.getElementById('create-modal').style.display = 'none';
        }
        function closeQrModal() {
            document.getElementById('qr-modal').style.display = 'none';
        }

        // --- توابع ارتباط با بک‌اند ---
        async function fetchStats() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('stat-total').innerText = data.totalUsers;
            document.getElementById('stat-active').innerText = data.activeUsers;
            // تبدیل مگابایت به گیگابایت (فرضی)
            document.getElementById('stat-used').innerText = (data.totalTraffic / 1024).toFixed(2);
            document.getElementById('stat-limit').innerText = data.totalLimit;
        }

        async function fetchUsers() {
            const res = await fetch('/api/users');
            const users = await res.json();
            const tbody = document.getElementById('users-table');
            tbody.innerHTML = '';
            
            users.forEach(user => {
                const row = `
                    <tr class="table-row transition-colors">
                        <td class="p-4 font-medium text-white">${user.name}</td>
                        <td class="p-4 text-slate-400 text-xs font-mono">${user.uuid.substring(0, 8)}...</td>
                        <td class="p-4">
                            <span class="px-2 py-1 text-xs rounded-full ${user.status === 'active' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}">
                                ${user.status === 'active' ? 'فعال' : 'غیرفعال'}
                            </span>
                        </td>
                        <td class="p-4 text-slate-300 text-sm">${(user.usedTraffic / 1024).toFixed(2)} / ${user.dataLimit} GB</td>
                        <td class="p-4 text-slate-300 text-sm">${user.expireDate ? new Date(user.expireDate).toLocaleDateString('fa-IR') : 'نامحدود'}</td>
                        <td class="p-4">
                            <div class="flex gap-2">
                                <button onclick="showQr('${user.id}')" class="bg-slate-700 hover:bg-blue-600 p-2 rounded transition" title="مشاهده لینک">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                </button>
                                <button onclick="deleteUser('${user.id}')" class="bg-slate-700 hover:bg-red-600 p-2 rounded transition" title="حذف">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        async function createUser() {
            const name = document.getElementById('c-name').value;
            const host = document.getElementById('c-host').value;
            const path = document.getElementById('c-path').value || '/';
            const dataLimit = parseInt(document.getElementById('c-limit').value) || 0;
            const expireDays = parseInt(document.getElementById('c-expire').value) || 0;

            if(!name || !host) {
                alert('نام و آدرس سرور الزامی است');
                return;
            }

            const res = await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, host, path, dataLimit, expireDays })
            });
            const data = await res.json();

            if(data.success) {
                closeCreateModal();
                showQr(data.user.id);
                fetchUsers();
                fetchStats();
                
                // ریست کردن فرم
                document.getElementById('c-name').value = '';
                document.getElementById('c-host').value = '';
            } else {
                alert('خطا در ساخت کاربر');
            }
        }

        async function deleteUser(id) {
            if(confirm('آیا از حذف این کاربر مطمئن هستید؟')) {
                await fetch(`/api/users/${id}`, { method: 'DELETE' });
                fetchUsers();
                fetchStats();
            }
        }

        async function showQr(id) {
            const res = await fetch(`/api/qr/${id}`);
            const data = await res.json();
            
            // پیدا کردن لینک کاربر
            const userRes = await fetch('/api/users');
            const users = await userRes.json();
            const user = users.find(u => u.id === id);
            
            document.getElementById('qr-image').src = data.qr;
            document.getElementById('vless-text').innerText = user.vlessLink;
            document.getElementById('qr-modal').style.display = 'flex';
        }

        function copyLink() {
            const text = document.getElementById('vless-text').innerText;
            navigator.clipboard.writeText(text);
            alert('لینک کپی شد!');
        }

        // لود اولیه اطلاعات هنگام باز شدن سایت
        fetchUsers();
        fetchStats();
    </script>
</body>
                    </html>
